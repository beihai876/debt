<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>还债记录 · 账号版</title>
<style>
  :root {
    --ink: #1a1714; --paper: #f0ebe3; --card: #fbf8f3; --line: #d4cabb;
    --line-soft: #e8e0d4; --rust: #b3502f; --rust-deep: #8f3e23;
    --moss: #5a6b3f; --moss-deep: #44542f; --muted: #8a7f70;
    --gold: #c08a2d; --shadow: rgba(40, 30, 20, 0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: var(--ink); background: var(--paper); -webkit-font-smoothing: antialiased; min-height: 100vh;
  }
  .wrap { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }
  .masthead { border-bottom: 2.5px solid var(--ink); padding-bottom: 18px; display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
  .mast-left { flex: 0 1 auto; }
  .eyebrow { font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--rust); font-weight: 700; margin-bottom: 10px; }
  .title { font-family: Georgia, 'Songti SC', serif; font-size: clamp(34px, 7vw, 52px); font-weight: 700; letter-spacing: -0.02em; line-height: 0.95; }
  .title .accent { color: var(--rust); font-style: italic; }
  .sync-status { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .mast-right { display: flex; flex-direction: column; align-items: flex-end; gap: 7px; }
  .today-date { font-family: Georgia, 'Songti SC', serif; font-size: 14px; font-weight: 600; color: var(--ink); letter-spacing: 0.01em; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.ok { background: var(--moss); }
  .dot.err { background: var(--rust); }
  .dot.sync { background: var(--gold); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* ---------- 登录卡 ---------- */
  .auth-screen { max-width: 380px; margin: 50px auto 0; }
  .auth-card { background: var(--card); border: 1px solid var(--line); border-radius: 2px; padding: 28px 26px; box-shadow: 0 2px 10px var(--shadow); }
  .auth-tabs { display: flex; gap: 0; margin-bottom: 22px; border-bottom: 1px solid var(--line); }
  .auth-tab { flex: 1; text-align: center; padding: 10px; font-size: 14px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; }
  .auth-tab.active { color: var(--ink); border-bottom-color: var(--rust); }
  .auth-field { margin-bottom: 14px; }
  .auth-field label { display: block; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; font-weight: 600; }
  .auth-field input { width: 100%; font-family: inherit; font-size: 15px; padding: 11px 12px; border: 1px solid var(--line); border-radius: 2px; background: #fff; color: var(--ink); }
  .auth-field input:focus { outline: none; border-color: var(--rust); box-shadow: 0 0 0 3px rgba(179, 80, 47, 0.12); }
  .password-wrap { position: relative; }
  .password-wrap input { padding-right: 58px; }
  .password-toggle { position: absolute; right: 7px; top: 50%; transform: translateY(-50%); border: none; background: transparent; color: var(--rust-deep); font-family: inherit; font-size: 12px; font-weight: 600; padding: 5px 6px; cursor: pointer; }
  .password-toggle:hover { color: var(--rust); }
  .password-toggle:focus-visible { outline: 2px solid var(--rust); outline-offset: 1px; }
  .remember-row { display: flex; align-items: center; gap: 7px; margin: -2px 0 14px; color: var(--ink); font-size: 12px; cursor: pointer; user-select: none; }
  .remember-row input { width: 15px; height: 15px; accent-color: var(--rust); }
  .remember-note { margin-left: auto; color: var(--muted); font-size: 10px; }
  .auth-btn { width: 100%; font-family: inherit; font-size: 15px; font-weight: 600; padding: 12px; border: none; border-radius: 2px; background: var(--ink); color: var(--paper); cursor: pointer; margin-top: 4px; transition: background 0.15s; }
  .auth-btn:hover { background: #000; }
  .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-msg { font-size: 13px; margin-top: 14px; padding: 10px 12px; border-radius: 2px; line-height: 1.5; display: none; }
  .auth-msg.err { display: block; background: #fdeee7; color: var(--rust-deep); border: 1px solid var(--rust); }
  .auth-msg.ok { display: block; background: rgba(90,107,63,0.12); color: var(--moss-deep); border: 1px solid var(--moss); }
  .auth-hint { font-size: 11px; color: var(--muted); text-align: center; margin-top: 16px; line-height: 1.6; }

  .account-menu { position: relative; margin-top: 3px; }
  .account-trigger { display: flex; align-items: center; gap: 7px; font-family: inherit; font-size: 12px; font-weight: 600; padding: 7px 11px; border: 1px solid var(--line); border-radius: 2px; background: var(--card); color: var(--ink); cursor: pointer; }
  .account-trigger:hover { border-color: var(--rust); color: var(--rust-deep); }
  .account-caret { font-size: 10px; color: var(--muted); transition: transform 0.15s; }
  .account-menu.open .account-caret { transform: rotate(180deg); }
  .account-popover { display: none; position: absolute; right: 0; top: calc(100% + 8px); z-index: 20; width: min(280px, calc(100vw - 32px)); padding: 14px; border: 1px solid var(--line); border-radius: 2px; background: var(--card); box-shadow: 0 8px 28px rgba(40, 30, 20, 0.16); }
  .account-menu.open .account-popover { display: block; }
  .account-label { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--rust); font-weight: 700; margin-bottom: 7px; }
  .account-email { font-size: 13px; font-weight: 600; color: var(--ink); word-break: break-all; margin-bottom: 12px; }
  .logout-btn { font-size: 12px; font-weight: 600; padding: 6px 12px; border: 1px solid var(--line); border-radius: 2px; background: transparent; color: var(--muted); cursor: pointer; font-family: inherit; }
  .logout-btn:hover { background: #eee2d8; color: var(--rust-deep); border-color: var(--rust); }

  .summary { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 18px; padding: 28px 0 30px; border-bottom: 1px solid var(--line); margin-bottom: 24px; }
  .total-block { width: 100%; }
  .total-label { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
  .total-amount { font-family: Georgia, serif; font-size: clamp(44px, 10vw, 64px); font-weight: 700; line-height: 0.9; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
  .total-amount .sym { font-size: 0.5em; vertical-align: 0.18em; color: var(--muted); margin-right: 2px; }
  .total-amount.zero { color: var(--moss); }
  .meta-stats { display: flex; gap: 56px; justify-content: center; }
  .stat { text-align: center; }
  .stat .num { font-family: Georgia, serif; font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat .lbl { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
  .stat.paid .num { color: var(--moss); }

  /* ---------- 月度预算（工资/生活费） ---------- */
  .budget { background: var(--card); border: 1px solid var(--line); border-radius: 2px; padding: 16px 18px; margin-bottom: 24px; }
  .budget-head { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .budget-head::before { content: "≈"; color: var(--moss-deep); font-size: 15px; font-weight: 700; }
  .budget-grid { display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap; }
  .budget-field { flex: 1; min-width: 120px; }
  .budget-field label { display: block; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; font-weight: 600; }
  .budget-field input { width: 100%; font-family: inherit; font-size: 15px; padding: 9px 11px; border: 1px solid var(--line); border-radius: 2px; background: #fff; color: var(--ink); font-variant-numeric: tabular-nums; }
  .budget-field input:focus { outline: none; border-color: var(--moss); box-shadow: 0 0 0 3px rgba(90,107,63,0.12); }
  .budget-result { flex: 1.3; min-width: 180px; text-align: right; padding-left: 10px; }
  .budget-result .br-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .budget-result .br-num { font-family: Georgia, serif; font-size: 30px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; color: var(--moss-deep); }
  .budget-result .br-num.neg { color: var(--rust-deep); }
  .br-disp-wrap { margin-top: 14px; padding-top: 12px; border-top: 1px dashed var(--line); }
  .br-disp-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .br-disp { font-family: Georgia, serif; font-size: 24px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; color: var(--ink); }
  .br-disp.neg { color: var(--rust-deep); }
  .br-disp .sym { font-size: 0.55em; color: var(--muted); vertical-align: 0.1em; }
  .br-disp-sub { font-size: 10px; color: var(--muted); margin-top: 5px; line-height: 1.4; }
  .budget-result .br-num .sym { font-size: 0.55em; color: var(--muted); vertical-align: 0.1em; }
  .budget-payoff { font-size: 11px; color: var(--muted); margin-top: 14px; line-height: 1.5; }
  .budget-payoff b { color: var(--ink); font-weight: 600; }

  .addbar { background: var(--card); border: 1px solid var(--line); border-radius: 2px; padding: 18px; margin-bottom: 28px; }
  .addbar-title { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .addbar-title::before { content: "+"; color: var(--rust); font-size: 16px; font-weight: 700; }
  .addrow { display: flex; gap: 10px; flex-wrap: wrap; }
  .field { flex: 1; min-width: 130px; }
  .field label { display: block; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; font-weight: 600; }
  .field input, .field select { width: 100%; font-family: inherit; font-size: 15px; padding: 11px 12px; border: 1px solid var(--line); border-radius: 2px; background: #fff; color: var(--ink); }
  .field input:focus, .field select:focus { outline: none; border-color: var(--rust); box-shadow: 0 0 0 3px rgba(179, 80, 47, 0.12); }
  .field input::placeholder { color: #bcae9c; }
  .btn { font-family: inherit; font-size: 14px; font-weight: 600; padding: 11px 22px; border: none; border-radius: 2px; cursor: pointer; transition: transform 0.08s, background 0.15s; }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--ink); color: var(--paper); align-self: flex-end; }
  .btn-primary:hover { background: #000; }
  .btn-add-field { display: flex; align-items: flex-end; }

  /* ---------- 工具栏：搜索/筛选/排序 ---------- */
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
  .search-box { flex: 1; min-width: 160px; position: relative; }
  .search-box input { width: 100%; font-family: inherit; font-size: 14px; padding: 9px 12px 9px 32px; border: 1px solid var(--line); border-radius: 2px; background: #fff; color: var(--ink); }
  .search-box input:focus { outline: none; border-color: var(--rust); box-shadow: 0 0 0 3px rgba(179,80,47,0.1); }
  .search-box::before { content: "⌕"; position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; }
  .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 2px; overflow: hidden; background: #fff; }
  .seg button { font-family: inherit; font-size: 12px; font-weight: 600; padding: 9px 13px; border: none; background: transparent; color: var(--muted); cursor: pointer; border-right: 1px solid var(--line); transition: background 0.15s, color 0.15s; }
  .seg button:last-child { border-right: none; }
  .seg button.active { background: var(--ink); color: var(--paper); }
  .sort-select { font-family: inherit; font-size: 13px; padding: 9px 11px; border: 1px solid var(--line); border-radius: 2px; background: #fff; color: var(--ink); cursor: pointer; }
  .sort-select:focus { outline: none; border-color: var(--rust); }

  .section-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; }
  .section-head h2 { font-family: Georgia, serif; font-size: 22px; font-weight: 700; }
  .section-head .rule { flex: 1; height: 1px; background: var(--line); }
  .section-head .count { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }

  /* ---------- 卡片：两列网格 ---------- */
  .cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .card { background: var(--card); border: 1px solid var(--line); border-left: 4px solid var(--rust); border-radius: 2px; padding: 16px 18px; box-shadow: 0 1px 2px var(--shadow); transition: box-shadow 0.2s, border-left-color 0.3s; }
  .card.cleared { border-left-color: var(--moss); opacity: 0.82; }
  .card:hover { box-shadow: 0 4px 14px var(--shadow); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .card-name { font-family: Georgia, serif; font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; word-break: break-all; }
  .badge { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; padding: 2px 6px; border-radius: 2px; background: var(--moss); color: #fff; transform: translateY(-1px); white-space: nowrap; }
  .badge.category { background: rgba(179,80,47,0.12); color: var(--rust-deep); border: 1px solid rgba(179,80,47,0.35); }
  .card-owe { text-align: right; flex-shrink: 0; }
  .owe-amount { font-family: Georgia, serif; font-size: 23px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .owe-amount .sym { font-size: 0.55em; color: var(--muted); vertical-align: 0.1em; }
  .owe-amount.cleared { color: var(--moss); }
  .owe-sub { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }
  .progress { margin: 14px 0 4px; }
  .progress-track { height: 5px; background: var(--line-soft); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--moss); border-radius: 3px; transition: width 0.4s ease; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-top: 6px; font-variant-numeric: tabular-nums; }
  .progress-meta .repaid { color: var(--moss-deep); font-weight: 600; }
  .card-actions { display: flex; gap: 7px; margin-top: 14px; align-items: center; flex-wrap: wrap; }
  .mini-input { width: 78px; flex: 1; min-width: 60px; font-size: 14px; padding: 8px 9px; border: 1px solid var(--line); border-radius: 2px; font-variant-numeric: tabular-nums; font-family: inherit; background: #fff; }
  .mini-input:focus { outline: none; border-color: var(--rust); }
  .btn-mini { font-size: 12px; font-weight: 600; padding: 8px 11px; border-radius: 2px; border: 1px solid; cursor: pointer; font-family: inherit; background: #fff; transition: background 0.15s, transform 0.08s; white-space: nowrap; }
  .btn-mini:active { transform: translateY(1px); }
  .btn-repay { border-color: var(--moss); color: var(--moss-deep); }
  .btn-repay:hover { background: var(--moss); color: #fff; }
  .btn-borrow { border-color: var(--rust); color: var(--rust-deep); }
  .btn-borrow:hover { background: var(--rust); color: #fff; }
  .btn-del { border-color: var(--line); color: var(--muted); background: transparent; padding: 8px 10px; }
  .btn-del:hover { background: #eee2d8; color: var(--rust-deep); border-color: var(--rust); }
  .btn-edit { border-color: var(--line); color: var(--ink); }
  .btn-edit:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .edit-panel { margin-top: 12px; padding: 13px; border: 1px solid var(--line); background: #fff; }
  .edit-grid { display: grid; grid-template-columns: minmax(0, 1.5fr) minmax(120px, 1fr); gap: 10px; }
  .edit-field label { display: block; font-size: 9px; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 5px; font-weight: 600; }
  .edit-field input, .edit-field select { width: 100%; font-family: inherit; font-size: 14px; padding: 9px 10px; border: 1px solid var(--line); border-radius: 2px; background: var(--card); color: var(--ink); }
  .edit-field input:focus, .edit-field select:focus { outline: none; border-color: var(--rust); box-shadow: 0 0 0 3px rgba(179,80,47,0.1); }
  .edit-note { font-size: 10px; color: var(--muted); margin-top: 7px; line-height: 1.5; }
  .edit-error { min-height: 18px; font-size: 11px; color: var(--rust-deep); margin-top: 6px; }
  .edit-actions { display: flex; justify-content: flex-end; gap: 7px; }
  .btn-save { border-color: var(--moss); background: var(--moss); color: #fff; }
  .btn-save:hover { background: var(--moss-deep); }
  .btn-scan { border-color: var(--gold); color: #805713; }
  .btn-scan:hover { background: var(--gold); color: #fff; }
  .bill-summary { margin-top: 12px; padding: 10px 12px; border: 1px solid var(--line); background: rgba(192,138,45,0.06); }
  .bill-summary-main { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; }
  .bill-summary-title { font-size: 11px; font-weight: 700; color: var(--ink); }
  .bill-summary-amount { font-family: Georgia, serif; font-size: 18px; font-weight: 700; color: var(--rust-deep); }
  .bill-summary-sub { font-size: 10px; color: var(--muted); margin-top: 5px; line-height: 1.5; }
  .bill-panel { margin-top: 12px; padding: 14px; border: 1px solid var(--gold); background: #fffcf5; }
  .bill-panel-head { display: flex; justify-content: space-between; gap: 10px; align-items: center; margin-bottom: 10px; }
  .bill-panel-title { font-size: 12px; font-weight: 700; color: var(--ink); }
  .bill-panel-note { font-size: 10px; color: var(--muted); line-height: 1.55; margin-bottom: 10px; }
  .bill-upload { display: grid; gap: 9px; }
  .bill-file { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
  .bill-file-label { display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: 11px 14px; }
  .bill-preview { display: none; width: 100%; max-height: 240px; object-fit: contain; border: 1px solid var(--line); background: #fff; }
  .bill-preview.show { display: block; }
  .bill-status { min-height: 18px; font-size: 11px; color: var(--muted); line-height: 1.5; }
  .bill-status.err { color: var(--rust-deep); }
  .bill-editor-meta { display: grid; grid-template-columns: 1.4fr 0.6fr; gap: 8px; margin-bottom: 10px; }
  .bill-editor input { width: 100%; font-family: inherit; font-size: 12px; padding: 8px 9px; border: 1px solid var(--line); background: #fff; color: var(--ink); }
  .bill-editor input:focus { outline: none; border-color: var(--rust); }
  .bill-row { display: grid; grid-template-columns: 0.65fr 1fr 0.75fr 1fr auto; gap: 6px; align-items: center; margin-bottom: 7px; }
  .bill-row-head { font-size: 9px; color: var(--muted); letter-spacing: 0.06em; text-align: left; }
  .bill-remove-row { border: none; background: transparent; color: var(--rust-deep); cursor: pointer; font-size: 16px; padding: 4px; }
  .bill-warnings { font-size: 10px; color: #805713; line-height: 1.5; margin: 8px 0; }
  .bill-editor-actions, .bill-list-actions { display: flex; gap: 7px; flex-wrap: wrap; justify-content: flex-end; margin-top: 10px; }
  .bill-list { margin-top: 10px; border-top: 1px dashed var(--line); padding-top: 7px; }
  .bill-item { display: grid; grid-template-columns: 0.7fr 1fr auto; gap: 8px; font-size: 11px; padding: 6px 0; border-bottom: 1px solid var(--line-soft); }
  .bill-item:last-child { border-bottom: none; }
  .bill-item .amt { font-weight: 700; color: var(--rust-deep); text-align: right; }
  .card-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
  .history-toggle { font-size: 11px; color: var(--muted); cursor: pointer; user-select: none; display: inline-flex; align-items: center; gap: 5px; }
  .history-toggle:hover { color: var(--ink); }
  .history { margin-top: 10px; border-top: 1px dashed var(--line); padding-top: 10px; }
  .h-item { display: flex; justify-content: space-between; font-size: 12px; padding: 5px 0; border-bottom: 1px solid var(--line-soft); font-variant-numeric: tabular-nums; }
  .h-item:last-child { border-bottom: none; }
  .h-left { display: flex; align-items: center; gap: 8px; color: var(--muted); }
  .h-tag { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; padding: 2px 6px; border-radius: 2px; }
  .h-tag.repay { background: rgba(90,107,63,0.15); color: var(--moss-deep); }
  .h-tag.borrow { background: rgba(179,80,47,0.13); color: var(--rust-deep); }
  .h-amt.repay { color: var(--moss-deep); font-weight: 600; }
  .h-amt.borrow { color: var(--rust-deep); font-weight: 600; }
  .empty { text-align: center; padding: 50px 20px; color: var(--muted); grid-column: 1 / -1; }
  .empty .mark { font-family: Georgia, serif; font-size: 44px; color: var(--line); margin-bottom: 12px; }
  .empty p { font-size: 14px; line-height: 1.6; }
  .footnote { margin-top: 40px; padding-top: 16px; border-top: 1px solid var(--line); font-size: 11px; color: var(--muted); line-height: 1.6; }

<body>
<div class="wrap">
  <div class="masthead">
    <div class="mast-left">
      <div class="eyebrow">个人欠款台账 · Accounts</div>
      <h1 class="title">还<span class="accent">债</span>记录</h1>
    </div>
    <div class="mast-right">
      <div class="today-date" id="todayDate"></div>
      <div class="sync-status"><span class="dot" id="syncDot"></span><span id="syncText">未登录</span></div>
      <div class="account-menu hidden" id="accountMenu">
        <button class="account-trigger" id="accountBtn" type="button" aria-expanded="false">个人账号 <span class="account-caret">▾</span></button>
        <div class="account-popover" id="accountPopover">
          <div class="account-label">当前账号</div>
          <div class="account-email" id="userEmail"></div>
          <button class="logout-btn" id="logoutBtn" type="button">退出登录</button>
        </div>
      </div>
    </div>
  </div>

  <div id="configBanner" class="banner hidden">
    <b>还没配置云端。</b> 请把文件顶部的 <code>SUPABASE_URL</code> 和 <code>SUPABASE_KEY</code> 换成你自己的。
  </div>

  <!-- 登录/注册界面 -->
  <div class="auth-screen" id="authScreen">
    <div class="auth-card">
      <div class="auth-tabs">
        <div class="auth-tab active" id="tabLogin">登录</div>
        <div class="auth-tab" id="tabSignup">注册</div>
      </div>
      <div class="auth-field">
        <label>邮箱</label>
        <input id="authEmail" type="email" placeholder="you@example.com" autocomplete="username" required>
      </div>
      <div class="auth-field">
        <label>密码</label>
        <div class="password-wrap">
          <input id="authPass" type="password" placeholder="至少 6 位" autocomplete="current-password" minlength="6" required>
          <button class="password-toggle" id="togglePassBtn" type="button" aria-label="显示密码" aria-pressed="false">显示</button>
        </div>
      </div>
      <label class="remember-row" id="rememberRow"><input id="rememberPass" type="checkbox"><span>记住密码</span><span class="remember-note">仅限私人设备</span></label>
      <button class="auth-btn" id="authBtn">登录</button>
      <div class="auth-msg" id="authMsg"></div>
      <div class="auth-hint" id="authHint">用邮箱和密码登录，只能看到自己的债务记录。<br>第一次用请先点上方「注册」。</div>
    </div>
  </div>

  <!-- 主界面 -->
  <div id="appScreen" class="hidden">
    <div class="summary">
      <div class="total-block">
        <div class="total-label">当前未还总额</div>
        <div class="total-amount" id="totalOwed"><span class="sym">¥</span>0</div>
      </div>
      <div class="meta-stats">
        <div class="stat paid"><div class="num" id="totalRepaid">¥0</div><div class="lbl">累计已还</div></div>
        <div class="stat"><div class="num" id="clearedCount">0/0</div><div class="lbl">已结清</div></div>
      </div>
    </div>

    <!-- 月度预算 -->
    <div class="budget">
      <div class="budget-head">每月收支与可还款</div>
      <div class="budget-grid">
        <div class="budget-field">
          <label>月工资收入</label>
          <input id="incomeInput" type="number" placeholder="0" inputmode="decimal" min="0" step="0.01">
        </div>
        <div class="budget-field">
          <label>月生活费</label>
          <input id="expenseInput" type="number" placeholder="0" inputmode="decimal" min="0" step="0.01">
        </div>
        <div class="budget-field">
          <label>日生活费</label>
          <input id="dailyInput" type="number" placeholder="0" inputmode="decimal" min="0" step="0.01">
        </div>
        <div class="budget-result">
          <div class="br-label">每月可用于还债</div>
          <div class="br-num" id="budgetNet"><span class="sym">¥</span>0</div>
          <div class="br-disp-wrap">
            <div class="br-disp-label">本月剩余可支配</div>
            <div class="br-disp" id="budgetDisp"><span class="sym">¥</span>0</div>
            <div class="br-disp-sub" id="budgetDispSub"></div>
          </div>
        </div>
      </div>
      <div class="budget-payoff" id="budgetPayoff"></div>
    </div>

    <div class="addbar" id="addbar">
      <div class="addbar-title">新增一笔债务</div>
      <div class="addrow">
        <div class="field"><label>平台 / 对象</label><input id="newName" placeholder="如：花呗、张三、信用卡"></div>
        <div class="field" style="flex: 0 1 150px;"><label>债务类目</label><select id="newCategory"><option value="online_loan">网贷</option><option value="credit_card">信用卡</option><option value="personal">个人借款</option><option value="other" selected>其他</option></select></div>
        <div class="field" style="flex: 0 1 180px;"><label>欠款金额</label><input id="newAmount" type="number" placeholder="0.00" min="0" step="0.01" inputmode="decimal"></div>
        <div class="btn-add-field"><button class="btn btn-primary" id="addBtn">记一笔</button></div>
      </div>
    </div>

    <!-- 工具栏 -->
    <div class="toolbar">
      <div class="search-box"><input id="searchInput" type="text" placeholder="搜索平台 / 对象"></div>
      <div class="seg" id="filterSeg">
        <button data-filter="all" class="active">全部</button>
        <button data-filter="open">未结清</button>
        <button data-filter="cleared">已结清</button>
      </div>
      <select class="sort-select" id="sortSelect">
        <option value="recent">最近添加</option>
        <option value="owe_desc">未还 多→少</option>
        <option value="owe_asc">未还 少→多</option>
        <option value="principal_desc">本金 多→少</option>
        <option value="principal_asc">本金 少→多</option>
      </select>
    </div>

    <div class="section-head">
      <h2>债务明细</h2><span class="rule"></span><span class="count" id="debtCount">0 笔</span>
    </div>
    <div id="list"></div>

    <div class="footnote">
      每个账号的数据互相独立，只有你自己能看到、修改自己的记录。手机和电脑用同一网址、同一账号登录即可同步。月工资和生活费仅用于估算每月可还款，不计入债务。
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@7.0.0/dist/tesseract.min.js"></script>
<script>
  // ============================================================
  //  ↓↓↓ 只需修改下面这两行 ↓↓↓
  // ============================================================
  var SUPABASE_URL = "https://iqxafcpciutvudqbgozd.supabase.co";
  var SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlxeGFmY3BjaXV0dnVkcWJnb3pkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NTMyMjQsImV4cCI6MjA5NzUyOTIyNH0.0d4GyjdqfgbqHSSWeim0wTfnzmyvw3hg3AGZRCnmyu0";
  // ============================================================

  var TABLE = "debts";
  var SETTINGS_ID = "__settings__";
  var REMEMBER_KEY = "debt_remembered_login";
  var configured = SUPABASE_URL.indexOf("supabase.co") !== -1 && SUPABASE_KEY.indexOf("eyJ") === 0;
  var session = null;
  var debts = [];
  var settings = { income: 0, expense: 0, monthKey: "", monthPaid: 0 };
  var authMode = "login";
  var ui = { filter: "all", sort: "recent", search: "", editingId: null, billPanel: {}, billDrafts: {}, billUploads: {}, billOpen: {} };
  var saveTimer = null;
  var refreshPromise = null;

  var el = function (id) { return document.getElementById(id); };
  function setSync(state, text) { el('syncDot').className = 'dot' + (state ? ' ' + state : ''); el('syncText').textContent = text; }
  function fmt(n) { var v = Math.round((n + Number.EPSILON) * 100) / 100; return v.toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 2 }); }
  function today() { var d = new Date(); return (d.getMonth() + 1) + '月' + d.getDate() + '日'; }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
  function esc(s) { return String(s).replace(/[&<>"']/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; }); }
  function categoryLabel(value) { return { online_loan: '网贷', credit_card: '信用卡', personal: '个人借款', other: '其他' }[value] || '其他'; }
  function categoryOptions(selected) {
    return ['online_loan', 'credit_card', 'personal', 'other'].map(function (value) {
      return '<option value="' + value + '"' + (value === selected ? ' selected' : '') + '>' + categoryLabel(value) + '</option>';
    }).join('');
  }

  // ---------- 认证 ----------
  function authHeaders() {
    var h = { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' };
    if (session && session.access_token) h['Authorization'] = 'Bearer ' + session.access_token;
    else h['Authorization'] = 'Bearer ' + SUPABASE_KEY;
    return h;
  }
  function saveSession() { try { localStorage.setItem('debt_session', JSON.stringify(session)); } catch (e) {} }
  function loadSession() { try { var r = localStorage.getItem('debt_session'); session = r ? JSON.parse(r) : null; } catch (e) { session = null; } }
  function clearSession() { session = null; try { localStorage.removeItem('debt_session'); } catch (e) {} }
  function showAuthMsg(text, type) { var m = el('authMsg'); m.textContent = text; m.className = 'auth-msg ' + type; }

  function setPasswordVisible(visible) {
    el('authPass').type = visible ? 'text' : 'password';
    el('togglePassBtn').textContent = visible ? '隐藏' : '显示';
    el('togglePassBtn').setAttribute('aria-label', visible ? '隐藏密码' : '显示密码');
    el('togglePassBtn').setAttribute('aria-pressed', visible ? 'true' : 'false');
  }

  function loadRememberedLogin() {
    try {
      var raw = localStorage.getItem(REMEMBER_KEY);
      if (!raw) return;
      var remembered = JSON.parse(raw);
      if (!remembered.email || !remembered.password) throw new Error('invalid saved login');
      el('authEmail').value = remembered.email;
      el('authPass').value = remembered.password;
      el('rememberPass').checked = true;
    } catch (e) {
      try { localStorage.removeItem(REMEMBER_KEY); } catch (ignore) {}
    }
  }

  function updateRememberedLogin(email, password) {
    try {
      if (el('rememberPass').checked) localStorage.setItem(REMEMBER_KEY, JSON.stringify({ email: email, password: password }));
      else localStorage.removeItem(REMEMBER_KEY);
    } catch (e) {}
  }

  function setAccountMenu(open) {
    var menu = el('accountMenu');
    menu.classList.toggle('open', !!open);
    el('accountBtn').setAttribute('aria-expanded', open ? 'true' : 'false');
  }

  function readResponseJson(r) {
    return r.json().catch(function () { return {}; });
  }

  function applyAuthSession(d) {
    if (!d || !d.access_token || !d.user) return false;
    session = {
      access_token: d.access_token,
      refresh_token: d.refresh_token || (session && session.refresh_token) || '',
      expires_at: d.expires_at || Math.floor(Date.now() / 1000) + (d.expires_in || 3600),
      user: { id: d.user.id, email: d.user.email }
    };
    saveSession();
    return true;
  }

  function tokenExpiresSoon() {
    if (!session || !session.access_token) return true;
    var expiresAt = Number(session.expires_at) || 0;
    if (!expiresAt) {
      try {
        var payload = session.access_token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
        expiresAt = JSON.parse(atob(payload)).exp || 0;
      } catch (e) { return true; }
    }
    return expiresAt <= Math.floor(Date.now() / 1000) + 60;
  }

  function refreshSession() {
    if (!session || !session.refresh_token) return Promise.resolve(false);
    if (refreshPromise) return refreshPromise;
    refreshPromise = fetch(SUPABASE_URL + '/auth/v1/token?grant_type=refresh_token', {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: session.refresh_token })
    })
    .then(function (r) {
      return readResponseJson(r).then(function (d) { return r.ok && applyAuthSession(d); });
    })
    .catch(function () { return false; })
    .then(function (ok) { refreshPromise = null; return ok; });
    return refreshPromise;
  }

  function restoreSession() {
    loadSession();
    if (!session || !session.access_token) { setSync('', '未登录'); return; }
    if (!tokenExpiresSoon()) { enterApp(); return; }
    setSync('sync', '恢复登录中…');
    refreshSession().then(function (ok) {
      if (ok) enterApp();
      else { clearSession(); setSync('', '登录已过期'); showAuthMsg('登录已过期，请重新登录', 'err'); }
    });
  }

  function doAuth() {
    var email = el('authEmail').value.trim();
    var pass = el('authPass').value;
    if (!email || !pass) { showAuthMsg('请填写邮箱和密码', 'err'); return; }
    if (pass.length < 6) { showAuthMsg('密码至少 6 位', 'err'); return; }
    el('authBtn').disabled = true;
    el('authBtn').textContent = authMode === 'login' ? '登录中…' : '注册中…';
    var endpoint = authMode === 'login' ? 'token?grant_type=password' : 'signup';
    fetch(SUPABASE_URL + '/auth/v1/' + endpoint, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: pass })
    })
    .then(function (r) { return readResponseJson(r).then(function (d) { return { ok: r.ok, status: r.status, data: d }; }); })
    .then(function (res) {
      el('authBtn').disabled = false;
      el('authBtn').textContent = authMode === 'login' ? '登录' : '注册';
      var d = res.data;
      if (!res.ok) {
        var msg = d.msg || d.error_description || d.error || '操作失败';
        if (msg.indexOf('Invalid login') !== -1) msg = '邮箱或密码错误';
        if (msg.indexOf('already registered') !== -1) msg = '该邮箱已注册，请直接登录';
        if (msg.indexOf('User already') !== -1) msg = '该邮箱已注册，请直接登录';
        showAuthMsg(msg, 'err');
        return;
      }
      if (authMode === 'signup' && !d.access_token) {
        switchMode('login');
        showAuthMsg('注册成功！现在可以登录。', 'ok');
        return;
      }
      if (applyAuthSession(d)) {
        if (authMode === 'login') updateRememberedLogin(email, pass);
        enterApp();
      } else { showAuthMsg('登录异常，请重试', 'err'); }
    })
    .catch(function (e) { el('authBtn').disabled = false; el('authBtn').textContent = authMode === 'login' ? '登录' : '注册'; showAuthMsg('网络错误：' + e.message, 'err'); });
  }

  function switchMode(mode) {
    authMode = mode;
    el('tabLogin').className = 'auth-tab' + (mode === 'login' ? ' active' : '');
    el('tabSignup').className = 'auth-tab' + (mode === 'signup' ? ' active' : '');
    el('authBtn').textContent = mode === 'login' ? '登录' : '注册';
    el('authPass').setAttribute('autocomplete', mode === 'login' ? 'current-password' : 'new-password');
    el('rememberRow').classList.toggle('hidden', mode !== 'login');
    el('authHint').innerHTML = mode === 'login'
      ? '用邮箱和密码登录，只能看到自己的债务记录。<br>第一次用请先点上方「注册」。'
      : '注册一个新账号。和朋友各自注册，数据互不可见。';
    el('authMsg').className = 'auth-msg';
  }

  function logout() { clearSession(); debts = []; settings = { income: 0, expense: 0, monthKey: "", monthPaid: 0 }; ui.editingId = null; setAccountMenu(false); el('accountMenu').classList.add('hidden'); el('appScreen').classList.add('hidden'); el('authScreen').classList.remove('hidden'); setSync('', '未登录'); el('authEmail').value = ''; el('authPass').value = ''; setPasswordVisible(false); loadRememberedLogin(); }

  function enterApp() {
    el('authScreen').classList.add('hidden');
    el('appScreen').classList.remove('hidden');
    el('userEmail').textContent = session.user.email;
    el('accountMenu').classList.remove('hidden');
    setAccountMenu(false);
    setSync('ok', '已登录');
    cloudLoad();
  }

  // ---------- 数据读写 ----------
  function api(path, opts, retried) {
    opts = opts || {};
    var requestOpts = Object.assign({}, opts, { headers: Object.assign(authHeaders(), opts.headers || {}) });
    return fetch(SUPABASE_URL + '/rest/v1/' + path, requestOpts).then(function (r) {
      if (r.status !== 401 || retried || !session || !session.refresh_token) return r;
      return refreshSession().then(function (ok) { return ok ? api(path, opts, true) : r; });
    });
  }

  function cloudLoad() {
    setSync('sync', '同步中…');
    api(TABLE + '?select=*&order=sort.desc', { method: 'GET' })
      .then(function (r) { if (r.status === 401) { throw { auth: true }; } if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(function (rows) {
        debts = [];
        settings = { income: 0, expense: 0, monthKey: "", monthPaid: 0 };
        rows.forEach(function (row) {
          if (row.id === SETTINGS_ID) {
            if (row.data) { settings.income = row.data.income || 0; settings.expense = row.data.expense || 0; settings.monthKey = row.data.monthKey || ''; settings.monthPaid = row.data.monthPaid || 0; }
          } else {
            var debt = row.data ? Object.assign({ id: row.id, sort: row.sort }, row.data) : row;
            debt.log = Array.isArray(debt.log) ? debt.log : [];
            debt.installments = Array.isArray(debt.installments) ? debt.installments : [];
            debts.push(debt);
          }
        });
        el('incomeInput').value = settings.income ? settings.income : '';
        el('expenseInput').value = settings.expense ? settings.expense : '';
        el('dailyInput').value = settings.expense ? Math.round((settings.expense / 30) * 100) / 100 : '';
        var didReset = ensureMonth();
        setSync('ok', '已同步'); render();
        if (didReset) cloudSaveSettings();
      })
      .catch(function (e) { if (e.auth) { showAuthMsg('登录已过期，请重新登录', 'err'); logout(); return; } setSync('err', '同步失败'); console.error(e); render(); });
  }

  function cloudUpsert(d) {
    setSync('sync', '保存中…');
    var payload = { id: d.id, sort: d.sort, owner: session.user.id, data: { name: d.name, category: d.category || 'other', principal: d.principal, balance: d.balance, log: d.log, open: d.open, installments: d.installments || [], billMeta: d.billMeta || null } };
    return api(TABLE, { method: 'POST', headers: { 'Prefer': 'resolution=merge-duplicates' }, body: JSON.stringify(payload) })
      .then(function (r) { if (!r.ok) throw new Error(r.status); setSync('ok', '已同步'); })
      .catch(function (e) { setSync('err', '保存失败'); console.error(e); });
  }

  function cloudSaveSettings() {
    setSync('sync', '保存中…');
    var payload = { id: SETTINGS_ID, sort: 0, owner: session.user.id, data: { income: settings.income, expense: settings.expense, monthKey: settings.monthKey, monthPaid: settings.monthPaid } };
    return api(TABLE, { method: 'POST', headers: { 'Prefer': 'resolution=merge-duplicates' }, body: JSON.stringify(payload) })
      .then(function (r) { if (!r.ok) throw new Error(r.status); setSync('ok', '已同步'); })
      .catch(function (e) { setSync('err', '保存失败'); console.error(e); });
  }

  function cloudDelete(id) {
    setSync('sync', '删除中…');
    return api(TABLE + '?id=eq.' + encodeURIComponent(id), { method: 'DELETE' })
      .then(function (r) { if (!r.ok) throw new Error(r.status); setSync('ok', '已同步'); })
      .catch(function (e) { setSync('err', '删除失败'); console.error(e); });
  }

  // ---------- 操作 ----------
  function addDebt() {
    var name = el('newName').value.trim();
    var amt = parseFloat(el('newAmount').value);
    var category = el('newCategory').value;
    if (!name || isNaN(amt) || amt <= 0) return;
    var d = { id: uid(), sort: Date.now(), name: name, category: category, principal: amt, balance: amt, log: [{ t: 'borrow', amt: amt, date: today(), id: uid() }], open: false, installments: [], billMeta: null };
    debts.unshift(d);
    el('newName').value = ''; el('newAmount').value = ''; el('newCategory').value = 'other';
    render(); cloudUpsert(d);
  }
  function repay(id) {
    var amt = parseFloat(el('inp_' + id).value); if (isNaN(amt) || amt <= 0) return;
    var d = find(id); if (!d) return;
    var pay = Math.min(amt, d.balance);
    d.balance = Math.max(0, d.balance - amt);
    d.log.unshift({ t: 'repay', amt: pay, date: today(), id: uid() });
    // 计入本月已还（跨月先重置）
    ensureMonth();
    settings.monthPaid = round2(settings.monthPaid + pay);
    render(); cloudUpsert(d); cloudSaveSettings();
  }
  function borrowMore(id) {
    var amt = parseFloat(el('inp_' + id).value); if (isNaN(amt) || amt <= 0) return;
    var d = find(id); if (!d) return;

  function prepareBillImage(file) {
    return new Promise(function (resolve, reject) {
      if (!file || !/^image\//.test(file.type)) { reject(new Error('请选择图片文件')); return; }
      if (file.size > 8 * 1024 * 1024) { reject(new Error('图片不能超过 8MB')); return; }
      var reader = new FileReader();
      reader.onerror = function () { reject(new Error('读取图片失败')); };
      reader.onload = function () {
        var image = new Image();
        image.onerror = function () { reject(new Error('图片格式无法识别')); };
        image.onload = function () {
          var maxSide = 1600;
          var scale = Math.min(1, maxSide / Math.max(image.width, image.height));
          var canvas = document.createElement('canvas');
          canvas.width = Math.max(1, Math.round(image.width * scale));
          canvas.height = Math.max(1, Math.round(image.height * scale));
          var ctx = canvas.getContext('2d');
          ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
          var dataUrl = canvas.toDataURL('image/jpeg', 0.86);
          resolve({ preview: dataUrl });
        };
        image.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  function normalizeOcrText(text) {
    return String(text || '').replace(/[！-～]/g, function (c) { return String.fromCharCode(c.charCodeAt(0) - 0xFEE0); })
      .replace(/　/g, ' ').replace(/[￥]/g, '¥').replace(/(\d)\s+(?=\d)/g, '$1');
  }

  function localDateKey(date) {
    return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
  }

  function parseOcrDate(line, warnings) {
    var full = line.match(/(20\d{2})\s*[年\/\-.]\s*(\d{1,2})\s*[月\/\-.]\s*(\d{1,2})\s*日?/);
    var year, month, day;
    if (full) { year = Number(full[1]); month = Number(full[2]); day = Number(full[3]); }
    else {
      var shortDate = line.match(/(?:^|\D)(\d{1,2})\s*[月\/\-.]\s*(\d{1,2})\s*日?(?:\D|$)/);
      if (!shortDate) return '';
      month = Number(shortDate[1]); day = Number(shortDate[2]);
      var now = new Date(), candidate = new Date(now.getFullYear(), month - 1, day);
      if (candidate.getTime() < now.getTime() - 45 * 86400000) candidate.setFullYear(candidate.getFullYear() + 1);
      year = candidate.getFullYear();
      if (warnings.indexOf('部分日期没有年份，已按最近的未来日期推算') === -1) warnings.push('部分日期没有年份，已按最近的未来日期推算');
    }
    var parsed = new Date(year, month - 1, day);
    if (parsed.getFullYear() !== year || parsed.getMonth() !== month - 1 || parsed.getDate() !== day) return '';
    return localDateKey(parsed);
  }

  function parseOcrAmount(line) {
    var amountLine = line.replace(/20\d{2}\s*[年\/\-.]\s*\d{1,2}\s*[月\/\-.]\s*\d{1,2}\s*日?/g, ' ')
      .replace(/(?:^|\D)\d{1,2}\s*[月\/\-.]\s*\d{1,2}\s*日?(?:\D|$)/g, ' ');
    var patterns = [
      /(?:¥|RMB|人民币)\s*[:：]?\s*([0-9][0-9,]*(?:\.[0-9]{1,2})?)/i,
      /(?:应还|还款|本期|每期|金额|合计)\D{0,8}([0-9][0-9,]*(?:\.[0-9]{1,2})?)/,
      /(?:^|\s)([0-9]{1,7}\.[0-9]{2})(?:\s|元|$)/
    ];
    for (var i = 0; i < patterns.length; i++) {
      var match = amountLine.match(patterns[i]);
      if (match) { var amount = Number(match[1].replace(/,/g, '')); if (amount > 0) return amount; }
    }
    return 0;
  }

  function parseOcrPeriod(line, fallback) {
    var match = line.match(/第?\s*(\d{1,2})\s*期/) || line.match(/第?\s*(\d{1,2})\s*\/\s*\d{1,2}\s*期/);
    return match ? Number(match[1]) + '期' : fallback + '期';
  }

  function parseBillText(text, platform) {
    var normalized = normalizeOcrText(text), lines = normalized.split(/\r?\n/).map(function (line) { return line.trim(); }).filter(Boolean);
    var warnings = [], installments = [], usedAmountLines = {};
    lines.forEach(function (line, index) {
      var dueDate = parseOcrDate(line, warnings); if (!dueDate) return;
      var amount = parseOcrAmount(line), amountLine = index;
      if (!amount) {
        for (var offset = -2; offset <= 3; offset++) {
          var nearby = index + offset;
          if (!offset || nearby < 0 || nearby >= lines.length || usedAmountLines[nearby]) continue;
          amount = parseOcrAmount(lines[nearby]);
          if (amount) { amountLine = nearby; break; }
        }
      }
      if (amount) usedAmountLines[amountLine] = true;
      installments.push({ period: parseOcrPeriod(line, installments.length + 1), due_date: dueDate, amount: amount || '', note: '' });
    });
    if (!installments.length) {
      lines.forEach(function (line, index) {
        var amount = parseOcrAmount(line); if (!amount || usedAmountLines[index]) return;
        installments.push({ period: parseOcrPeriod(line, installments.length + 1), due_date: '', amount: amount, note: '' });
      });
    }
    if (!installments.length) installments.push({ period: '1期', due_date: '', amount: '', note: '' });
    if (installments.some(function (item) { return !item.due_date || !item.amount; })) warnings.push('有些日期或金额无法自动确定，请根据原图补充');
    return { platform: platform || '', currency: 'CNY', warnings: warnings, rawText: normalized.trim(), installments: installments.slice(0, 60) };
  }

  function renderBudget() {
    ensureMonth();
    var net = settings.income - settings.expense;
    var netEl = el('budgetNet');
    netEl.innerHTML = '<span class="sym">¥</span>' + fmt(net);
    netEl.className = 'br-num' + (net < 0 ? ' neg' : '');
    // 本月剩余可支配 = (工资 - 生活费) - 本月已还
    // 没有工资基数时不从 0 继续扣本月还款，避免清空工资后显示负数。
    var disp = settings.income > 0 ? net - settings.monthPaid : 0;
    var dispEl = el('budgetDisp');
    dispEl.innerHTML = '<span class="sym">¥</span>' + fmt(disp);
    dispEl.className = 'br-disp' + (disp < 0 ? ' neg' : '');
    var d = new Date();
    el('budgetDispSub').textContent = settings.income > 0
      ? (d.getMonth() + 1) + ' 月已还 ¥' + fmt(settings.monthPaid) + '，下月 1 号自动重置'
      : '填写月工资后，将自动扣除本月已还 ¥' + fmt(settings.monthPaid);
    var totalOwed = 0;
    debts.forEach(function (d) { totalOwed += d.balance; });
    var payoff = el('budgetPayoff');
    if (net > 0 && totalOwed > 0) {
      var months = Math.ceil(totalOwed / net);
      var yrs = Math.floor(months / 12), mos = months % 12;
      var dur = (yrs > 0 ? yrs + ' 年 ' : '') + (mos > 0 ? mos + ' 个月' : (yrs > 0 ? '' : '不到 1 个月'));
      payoff.innerHTML = '按当前节奏，全部还清约需 <b>' + dur.trim() + '</b>（未还总额 ¥' + fmt(totalOwed) + ' ÷ 每月可还 ¥' + fmt(net) + '）。';
    } else if (net <= 0 && (settings.income > 0 || settings.expense > 0)) {
      payoff.innerHTML = '生活费已不低于收入，<b>本月没有结余可用于还债</b>。';
    } else if (totalOwed === 0 && net > 0) {
      payoff.innerHTML = '当前没有未还债务。';
    } else {
      payoff.innerHTML = '填入月工资和生活费（月/日生活费会自动换算，按 1 个月 = 30 天），自动估算多久能还清。';
    }
  }

  function render() {
    var totalOwed = 0, totalRepaid = 0, cleared = 0;
    debts.forEach(function (d) { totalOwed += d.balance; d.log.forEach(function (l) { if (l.t === 'repay') totalRepaid += l.amt; }); if (d.balance <= 0) cleared++; });
    var owedEl = el('totalOwed');
    owedEl.innerHTML = '<span class="sym">¥</span>' + fmt(totalOwed);
    owedEl.className = 'total-amount' + (totalOwed <= 0 ? ' zero' : '');
    el('totalRepaid').textContent = '¥' + fmt(totalRepaid);
    el('clearedCount').textContent = cleared + '/' + debts.length;

    renderBudget();

    var shown = visibleDebts();
    el('debtCount').textContent = shown.length + ' / ' + debts.length + ' 笔';

    var list = el('list');
    if (debts.length === 0) {
      list.innerHTML = '<div class="cards"><div class="empty"><div class="mark">¥</div><p>还没有记录。<br>在上方添加第一笔债务开始记账吧。</p></div></div>';
      return;
    }
    if (shown.length === 0) {
      list.innerHTML = '<div class="cards"><div class="empty"><div class="mark">⌕</div><p>没有符合条件的记录。<br>换个筛选或搜索词试试。</p></div></div>';
      return;
    }

    var html = '<div class="cards">';
    shown.forEach(function (d) {
      var isC = d.balance <= 0;
      var repaidTotal = d.principal - d.balance;
      var pct = d.principal > 0 ? Math.min(100, (repaidTotal / d.principal) * 100) : 0;
      html += '<div class="card' + (isC ? ' cleared' : '') + '"><div class="card-top">';
      html += '<div class="card-name">' + esc(d.name) + (d.category ? '<span class="badge category">' + categoryLabel(d.category) + '</span>' : '') + (isC ? '<span class="badge">已结清</span>' : '') + '</div>';
      html += '<div class="card-owe"><div class="owe-amount' + (isC ? ' cleared' : '') + '"><span class="sym">¥</span>' + fmt(d.balance) + '</div><div class="owe-sub">未还余额</div></div></div>';
      html += '<div class="progress"><div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
      html += '<div class="progress-meta"><span>本金 ¥' + fmt(d.principal) + '</span><span class="repaid">已还 ¥' + fmt(repaidTotal) + ' · ' + pct.toFixed(0) + '%</span></div></div>';
      html += '<div class="card-actions">';
      html += '<input class="mini-input" type="number" id="inp_' + d.id + '" placeholder="金额" min="0" step="0.01" inputmode="decimal">';
      html += '<button class="btn-mini btn-repay" data-act="repay" data-id="' + d.id + '">− 还款</button>';
      html += '<button class="btn-mini btn-borrow" data-act="borrow" data-id="' + d.id + '">+ 加借</button>';
      html += '<button class="btn-mini btn-scan" data-act="open-bill" data-id="' + d.id + '">上传账单</button>';
      html += '<button class="btn-mini btn-edit" data-act="edit" data-id="' + d.id + '">修改</button>';
      html += '<button class="btn-mini btn-del" data-act="del" data-id="' + d.id + '">删除</button></div>';
      if (ui.editingId === d.id) {
        var repaidForEdit = d.log.reduce(function (sum, item) { return sum + (item.t === 'repay' ? Number(item.amt) || 0 : 0); }, 0);
        html += '<div class="edit-panel"><div class="edit-grid">';
        html += '<div class="edit-field"><label>平台 / 对象</label><input id="editName_' + d.id + '" data-edit-id="' + d.id + '" value="' + esc(d.name) + '"></div>';
        html += '<div class="edit-field"><label>债务类目</label><select id="editCategory_' + d.id + '" data-edit-id="' + d.id + '">' + categoryOptions(d.category || 'other') + '</select></div>';
        html += '<div class="edit-field"><label>欠款总额</label><input id="editPrincipal_' + d.id + '" data-edit-id="' + d.id + '" type="number" min="' + repaidForEdit + '" step="0.01" inputmode="decimal" value="' + d.principal + '"></div>';
        html += '</div><div class="edit-note">累计已还 ¥' + fmt(repaidForEdit) + ' 会保留，修改总额后自动重算未还余额。</div>';
        html += '<div class="edit-error" id="editError_' + d.id + '"></div><div class="edit-actions">';
        html += '<button class="btn-mini" data-act="cancel-edit" data-id="' + d.id + '">取消</button>';
        html += '<button class="btn-mini btn-save" data-act="save-edit" data-id="' + d.id + '">保存修改</button></div></div>';
      }
      html += renderBillSection(d);
      html += '<div class="card-foot">';
      if (d.log.length > 0) {
        html += '<div class="history-toggle" data-act="toggle" data-id="' + d.id + '">' + (d.open ? '▾ 收起记录' : '▸ 查看记录') + ' (' + d.log.length + ')</div>';
      } else { html += '<span></span>'; }
      html += '</div>';
      if (d.open && d.log.length > 0) {
        html += '<div class="history">';
        d.log.forEach(function (l) {
          html += '<div class="h-item"><div class="h-left"><span class="h-tag ' + (l.t === 'repay' ? 'repay' : 'borrow') + '">' + (l.t === 'repay' ? '还款' : '借入') + '</span><span>' + l.date + '</span></div>';
          html += '<div class="h-amt ' + (l.t === 'repay' ? 'repay' : 'borrow') + '">' + (l.t === 'repay' ? '−' : '+') + '¥' + fmt(l.amt) + '</div></div>';
        });
        html += '</div>';
      }
      html += '</div>';
    });
    html += '</div>';
    list.innerHTML = html;
  }

  // ---------- 事件 ----------
  el('tabLogin').addEventListener('click', function () { switchMode('login'); });
  el('tabSignup').addEventListener('click', function () { switchMode('signup'); });
  el('togglePassBtn').addEventListener('click', function () { setPasswordVisible(el('authPass').type === 'password'); });
  el('rememberPass').addEventListener('change', function () { if (!this.checked) { try { localStorage.removeItem(REMEMBER_KEY); } catch (e) {} } });
  el('accountBtn').addEventListener('click', function (e) { e.stopPropagation(); setAccountMenu(!el('accountMenu').classList.contains('open')); });
  el('accountMenu').addEventListener('click', function (e) { e.stopPropagation(); });
  document.addEventListener('click', function () { setAccountMenu(false); });
  el('authBtn').addEventListener('click', doAuth);
  el('authPass').addEventListener('keydown', function (e) { if (e.key === 'Enter') doAuth(); });
  el('authEmail').addEventListener('keydown', function (e) { if (e.key === 'Enter') el('authPass').focus(); });
  el('logoutBtn').addEventListener('click', logout);
  el('addBtn').addEventListener('click', addDebt);
  el('newName').addEventListener('keydown', function (e) { if (e.key === 'Enter') addDebt(); });
  el('newAmount').addEventListener('keydown', function (e) { if (e.key === 'Enter') addDebt(); });
  el('incomeInput').addEventListener('input', onIncomeChange);
  el('expenseInput').addEventListener('input', onMonthlyExpenseChange);
  el('dailyInput').addEventListener('input', onDailyExpenseChange);
  el('searchInput').addEventListener('input', function () { ui.search = this.value; render(); });
  el('sortSelect').addEventListener('change', function () { ui.sort = this.value; render(); });
  el('filterSeg').addEventListener('click', function (e) {
    var b = e.target.closest('button'); if (!b) return;
    ui.filter = b.getAttribute('data-filter');
    Array.prototype.forEach.call(this.querySelectorAll('button'), function (x) { x.className = ''; });
    b.className = 'active';
    render();
  });
  el('list').addEventListener('click', function (e) {
    var btn = e.target.closest('[data-act]'); if (!btn) return;
    var id = btn.getAttribute('data-id'), act = btn.getAttribute('data-act');
    if (act === 'repay') repay(id); else if (act === 'borrow') borrowMore(id);
    else if (act === 'edit') startEdit(id); else if (act === 'save-edit') saveEdit(id);
    else if (act === 'cancel-edit') cancelEdit(); else if (act === 'del') removeDebt(id);
    else if (act === 'toggle') toggleHist(id); else if (act === 'open-bill') openBillPanel(id);
    else if (act === 'close-bill') closeBillPanel(id); else if (act === 'recognize-bill') recognizeBill(id);
    else if (act === 'toggle-bill') toggleBillList(id); else if (act === 'edit-bill') editBillSchedule(id);
    else if (act === 'save-bill') saveBillDraft(id); else if (act === 'delete-bill') deleteBillSchedule(id);
    else if (act === 'add-bill-row') addBillRow(id);
    else if (act === 'remove-bill-row') removeBillRow(id, parseInt(btn.getAttribute('data-index'), 10));
  });
  el('list').addEventListener('change', function (e) { var id = e.target.getAttribute('data-bill-file'); if (id) selectBillImage(id, e.target); });
  el('list').addEventListener('keydown', function (e) {
    var input = e.target.closest('[data-edit-id]');
    if (input && e.key === 'Enter') saveEdit(input.getAttribute('data-edit-id'));
  });

  // ---------- 今天日期 ----------
  function renderToday() {
    var d = new Date();
    el('todayDate').textContent = d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日';
  }
  renderToday();
  // 跨过午夜自动更新日期
  setInterval(renderToday, 60000);

  // ---------- 启动 ----------
  if (!configured) { el('configBanner').classList.remove('hidden'); setSync('err', '未配置'); }
  loadRememberedLogin();
  restoreSession();
</script>
</body>
</html>
